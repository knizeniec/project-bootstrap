name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:

jobs:
  repository-policy-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate required governance files
        run: |
          test -f README.md
          test -f AGENTS.md
          test -f CONTRIBUTING.md
          test -f SECURITY.md
          test -f CHANGELOG.md
          test -f LICENSE
          test -f .github/CODEOWNERS
          test -f docs/00-source-of-truth.md
          test -f docs/adr/ADR-000-template.md
          test -f prompts/README.md
          test -f prompts/AGENTS.md
          test -f prompts/language-adaptation.md
          test -f prompts/project-bootstrap.md
          test -f prompts/architecture-baseline.md
          test -f prompts/refine-specs.md
      - name: Validate canonical path consistency
        run: |
          ! rg -n --glob '!.github/workflows/ci.yml' "docs/project/adr|docs/project/AGENTS|REPOSTORY_MAP|REPOSITORY_MAP" README.md AGENTS.md CONTRIBUTING.md prompts .github diagrams src tests config scripts bin examples docs/README.md docs/INDEX.md docs/00-documentation-standards.md docs/00-source-of-truth.md docs/Architecture.md docs/00_governance docs/01_strategy docs/02_product docs/03_architecture docs/04_ai_governance docs/05_testing_acceptance docs/06_security_operations docs/07_delivery docs/08_references docs/adr
      - name: Validate LICENSE is set when README declares one
        run: |
          if grep -q "^License:" README.md; then
            if grep -qF "REPLACE WITH YOUR CHOSEN LICENSE" LICENSE; then
              echo "ERROR: README declares a License but LICENSE file is still the template placeholder."
              exit 1
            fi
          fi
      - name: Validate canonical doc frontmatter
        run: |
          set -e
          missing=0
          active_docs="docs/README.md docs/Architecture.md docs/00-documentation-standards.md docs/00-source-of-truth.md docs/INDEX.md prompts/README.md docs/00_governance/README.md docs/02_product/README.md docs/03_architecture/README.md docs/adr/README.md"
          template_files=$(find docs -mindepth 2 -maxdepth 2 -name '*_TEMPLATE.md' | sort)
          if [ -z "$template_files" ]; then
            echo "ERROR: no starter templates found under docs/"
            missing=1
          fi
          for f in $active_docs; do
            for field in "Status:" "Owner:" "Purpose:" "Last updated:"; do
              if ! grep -q "^$field" "$f"; then
                echo "ERROR: $f missing frontmatter field: $field"
                missing=1
              fi
            done
            metadata_block=$(sed -n '1,25p' "$f")
            if printf '%s\n' "$metadata_block" | grep -Eq '^(Status|Owner|Purpose|Last updated): (\[|YYYY-MM-DD$)'; then
              echo "ERROR: $f still contains placeholder metadata"
              missing=1
            fi
          done
          for f in $template_files; do
            for field in "Status:" "Owner:" "Purpose:" "Last updated:"; do
              if ! grep -q "^$field" "$f"; then
                echo "ERROR: $f missing frontmatter field: $field"
                missing=1
              fi
            done
          done
          exit $missing

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md
            !node_modules
            !.opencode
            !.tmp

  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress './**/*.md'
          fail: true

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
