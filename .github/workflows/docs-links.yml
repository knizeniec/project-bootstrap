name: Docs Link Health

# Runs a weekly offline link check across all Markdown files.
# Opens a GitHub issue when broken links are found so the team can fix them
# without waiting for a PR to touch the affected files.

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch: # Allow manual runs

jobs:
  link-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --offline --no-progress './**/*.md'
          fail: false # Capture output; we handle failure ourselves below

      - name: Create or update broken-links issue
        if: steps.lychee.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[docs] Broken links detected"
          BODY="Lychee found broken links in a scheduled check on $(date -u '+%Y-%m-%d').

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Please review the run log for the full list of broken links and fix them."
          LABEL="documentation"

          # Try to find an existing open issue with this title.
          EXISTING=$(gh issue list --state open --label "$LABEL" --search "$TITLE" --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
            echo "Updated existing issue #$EXISTING"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "$LABEL"
          fi

      - name: Close broken-links issue if all links pass
        if: steps.lychee.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[docs] Broken links detected"
          LABEL="documentation"
          EXISTING=$(gh issue list --state open --label "$LABEL" --search "$TITLE" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue close "$EXISTING" --comment "All links pass as of $(date -u '+%Y-%m-%d'). Closing."
            echo "Closed issue #$EXISTING"
          fi
